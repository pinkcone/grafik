name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sprawdź sekrety i DNS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST:-}" ]; then echo "::error::Brak sekretu SSH_HOST"; exit 1; fi
          if [ -z "${SSH_USER:-}" ]; then echo "::error::Brak sekretu SSH_USER"; exit 1; fi

          HOST="$(echo "$SSH_HOST" | tr -d '[:space:]')"
          echo "SSH_HOST (oczyszczony): [$HOST]"

          if echo "$HOST" | grep -qiE '^https?://'; then
            echo "::error::SSH_HOST nie może zawierać http:// — wpisz samo IP lub domenę"
            exit 1
          fi

          if ! getent hosts "$HOST" > /dev/null 2>&1; then
            echo "::error::Nie można rozwiązać hosta [$HOST]. Użyj IP serwera w SSH_HOST (np. z: curl -4 ifconfig.me na serwerze)"
            exit 1
          fi
          echo "DNS_OK: $(getent hosts "$HOST" | head -1)"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${SSH_PRIVATE_KEY_B64:-}" ]; then
            echo "Używam SSH_PRIVATE_KEY_B64"
            echo "$SSH_PRIVATE_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key
          elif [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Używam SSH_PRIVATE_KEY"
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "::error::Brak SSH_PRIVATE_KEY lub SSH_PRIVATE_KEY_B64"
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::KEY_INVALID — klucz w sekrecie jest źle sformatowany. Użyj SSH_PRIVATE_KEY_B64 (patrz DEPLOY.md)"
            exit 1
          fi
          echo "KEY_OK"

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy na serwerze
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          HOST="$(echo "$SSH_HOST" | tr -d '[:space:]')"
          DIR="${APP_DIR:-/var/www/grafik}"

          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${HOST}" \
            "cd '${DIR}' && bash scripts/deploy.sh"
