name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Załaduj klucz SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy na serwerze
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST:-}" ]; then echo "::error::Brak SSH_HOST"; exit 1; fi
          if [ -z "${SSH_USER:-}" ]; then echo "::error::Brak SSH_USER"; exit 1; fi

          HOST="$(echo "$SSH_HOST" | tr -d '[:space:]')"
          DIR="${APP_DIR:-/var/www/grafik}"
          echo "SSH_HOST: [$HOST]"
          echo "SSH_USER: [$SSH_USER]"

          if ! getent hosts "$HOST" > /dev/null 2>&1; then
            echo "::error::Nie można rozwiązać hosta [$HOST]"
            exit 1
          fi

          echo "Fingerprint klucza w Actions (porównaj z serwerem):"
          ssh-add -l

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${HOST}" \
            "cd '${DIR}' && bash scripts/deploy.sh"
